<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title><!-- TITLE --></title>
  <style>
    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { min-height: 100vh; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
    img, svg { display: block; max-width: 100%; }
    input, button, textarea, select { font: inherit; }
    p, h1, h2, h3, h4, h5, h6 { overflow-wrap: break-word; }

    /* === Birchline Theme Tokens (default) === */
    :root {
      --color-primary: #D97757;
      --color-slate: #141413;
      --color-ivory: #FAF9F5;
      --color-oat: #E3DACC;
      --color-white: #FFFFFF;
      --color-gray-100: #F0EEE6;
      --color-gray-300: #D1CFC5;
      --color-gray-500: #87867F;
      --color-gray-700: #3D3D3A;
      --color-success: #788C5D;
      --color-warning: #C78E3F;
      --color-danger: #B04A4A;
      --color-info: #5C7CA3;
      --font-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      --type-body: 430 16px/1.55 var(--font-sans);
      --type-small: 430 14px/1.5 var(--font-sans);
      --type-caption: 500 12px/1.4 var(--font-sans);
      --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 24px; --sp-6: 32px;
      --radius-sm: 8px; --radius-md: 12px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 10px rgba(0,0,0,0.08);
      --bg-page: var(--color-ivory);
      --bg-surface: var(--color-white);
      --bg-muted: var(--color-gray-100);
      --text-primary: var(--color-slate);
      --text-secondary: var(--color-gray-700);
      --text-muted: var(--color-gray-500);
      --border-default: var(--color-gray-300);
      --border-subtle: var(--color-gray-100);
      --accent: var(--color-primary);
    }

    body { font: var(--type-body); color: var(--text-primary); background: var(--bg-page); }

    /* === Accessibility === */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg-page: #1A1A2E; --bg-surface: #232340; --bg-muted: #2C2C4A;
        --text-primary: #E0E0E0; --text-secondary: #A0A0B8; --text-muted: #6E6E8A;
        --border-default: #3A3A5C; --border-subtle: #2E2E4E;
        --accent: #64B5F6; --color-primary: #64B5F6;
      }
    }

    /* === Print === */
    @media print {
      .no-print { display: none !important; }
      body { background: white; color: black; }
    }

    /* <!-- STYLES --> */
  </style>
</head>
<body>
  <header><!-- CONTENT: header --></header>
  <main>
    <!-- CONTENT -->
  </main>
  <footer><!-- CONTENT: footer --></footer>
  <script>
    /* <!-- SCRIPTS --> */
  </script>
</body>
</html>
